name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Stage shared test vectors at the path tests expect
        run: |
          # Tests reference Path.of("../shared/test-vectors/..."). On the
          # mirror, vectors live in vendor/shared/test-vectors/ — stage a
          # sibling 'shared/' so both monorepo and mirror runs resolve.
          mkdir -p ../shared
          cp -R vendor/shared/test-vectors ../shared/

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # Maps the 'central' server-id used by central-publishing-maven-plugin
          # to env-var-driven credentials. Sonatype's Central Portal uses an
          # auto-generated username/password pair (NOT your Sonatype login).
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build + run tests
        run: mvn -B -ntp clean verify

      - name: Deploy to Sonatype Central Portal
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp -DskipTests deploy -P release
