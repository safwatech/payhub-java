name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # Maps the 'central' server-id used by central-publishing-maven-plugin
          # to env-var-driven credentials. Sonatype's Central Portal uses an
          # auto-generated username/password pair (NOT your Sonatype login).
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Deploy to Sonatype Central Portal
        # -Dmaven.test.skip=true skips test compile + run. Test sources
        # use Java 21 pattern-matching switch (case T x -> …) which
        # won't compile against the Java 17 target — the test suite is
        # mirror-CI-enforced separately. Publishing is gated on the
        # main-source build only.
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp -Dmaven.test.skip=true clean deploy -P release
